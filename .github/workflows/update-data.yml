name: Atualizar dados BCB

on:
  schedule:
    # 12:00 UTC = ~09:00 no horario de Brasilia (UTC-3)
    # ajuste o horario se quiser rodar em outro momento do dia
    - cron: '0 12 * * *'
  workflow_dispatch: {}   # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Buscar dados do BCB
        run: python scripts/fetch_bcb_data.py

      - name: Commitar se houver mudancas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fiscal_data.json
          if git diff --staged --quiet; then
            echo "Sem mudancas nos dados."
          else
            git commit -m "Atualiza dados BCB - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
